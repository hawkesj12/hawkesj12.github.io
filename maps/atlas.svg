<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img"
     aria-label="Architecture map of Atlas, a production AI operations platform, in a public C4 container view: a team web app calls a single API application that runs chat, agent, and document-ingestion services, which read and write a knowledge database and a document store, call a metered vendor large-language-model API, and sync with Microsoft 365, while background workers run enrichment offline off the request path, drawn in the Blueprint Lanes house style with neutral horizontal lanes and white category-colored cards."
     font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <!--
    ATLAS · PUBLIC (sanitized, portfolio-safe) architecture map · Blueprint Lanes · FLOW
    Layers = neutral lanes (grouping in VALUE). Cards = category (meaning in HUE).
    C4 Context/Container level. No real paths/hosts/ports/credentials. See _map-spec.md.
  -->
  <defs>
    <style>
      :root{
        --paper:#eceee9; --lane-a:#f6f7f4; --lane-b:#f1f2ee; --rule:#e0e2dd;
        --card:#ffffff; --ink:#26303a; --body:#4b5560; --muted:#8b939c;
        --header:#1d2a36; --chip:#dfe3e4;
        --entry-a:#00a19a; --entry-t:#006a65;
        --compute-a:#8673d9; --compute-t:#564597;
        --data-a:#2f8adc; --data-t:#00579a;
        --external-a:#b761b1; --external-t:#7b3577;
        --scheduled-a:#68737e; --scheduled-t:#474e55;
        --governance-a:#d15c56; --governance-t:#90302e;
        --free-a:#2e9e52; --free-t:#00682a;
        --metered-a:#b47900; --metered-t:#7a4a00;
      }
      .h1{font-size:25px;font-weight:800;fill:#eef2f6;letter-spacing:.2px}
      .h2{font-size:13px;fill:#aab6c1}
      .meta{font-size:11px;fill:#8b98a4}
      .chip-t{font-size:11px;font-weight:700;letter-spacing:1.5px;fill:#5b6470}
      .card{fill:var(--card);stroke:#e4e7e3;stroke-width:1}
      .accent{stroke-width:0}
      .ctitle{font-size:14.5px;font-weight:700}
      .cbody{font-size:11.5px;fill:var(--body)}
      .cmono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;fill:var(--muted)}
      .badge{fill:var(--header)} .badge-n{fill:#fff;font-size:11px;font-weight:700;text-anchor:middle}
      .edge{stroke:#9aa3aa;stroke-width:2;fill:none}
      .edge-lbl{font-size:10px;fill:var(--muted)}
      .legend-lbl{font-size:11.5px;fill:var(--body)}
      .footer{font-size:11.5px;fill:var(--body)}
      .prov{font-size:10.5px;fill:var(--muted)}
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa3aa"/>
    </marker>
    <filter id="lift" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d2a36" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="var(--paper)"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1200" height="92" fill="var(--header)"/>
  <rect x="0" y="90" width="1200" height="2" fill="#0f1922"/>
  <text x="40" y="44" class="h1">Atlas <tspan class="h2" dx="8">— system architecture</tspan></text>
  <text x="40" y="70" class="h2">A production AI operations platform: a knowledge library, a document-ingestion pipeline, and Claude-powered chat over the team's data.</text>
  <text x="1160" y="36" text-anchor="end" class="meta">v0.3.0 · 2026-07-23</text>
  <text x="1160" y="54" text-anchor="end" class="meta">mode: public · archetype: FLOW</text>
  <text x="1160" y="72" text-anchor="end" class="meta">built solo · warehouse-automation division</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(40,116)">
    <text x="0" y="11" class="chip-t">LEGEND</text>
    <g transform="translate(84,0)">
      <rect x="0"   y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="#e4e7e3"/><rect x="1.5"   y="2.5" width="3" height="9" rx="1.5" fill="var(--entry-a)"     stroke="var(--entry-a)"/>     <text x="26"  y="11" class="legend-lbl">entry</text>
      <rect x="72"  y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="#e4e7e3"/><rect x="73.5"  y="2.5" width="3" height="9" rx="1.5" fill="var(--compute-a)"   stroke="var(--compute-a)"/>   <text x="98"  y="11" class="legend-lbl">compute</text>
      <rect x="164" y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="#e4e7e3"/><rect x="165.5" y="2.5" width="3" height="9" rx="1.5" fill="var(--data-a)"      stroke="var(--data-a)"/>      <text x="190" y="11" class="legend-lbl">data</text>
      <rect x="232" y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="#e4e7e3"/><rect x="233.5" y="2.5" width="3" height="9" rx="1.5" fill="var(--external-a)"  stroke="var(--external-a)"/>  <text x="258" y="11" class="legend-lbl">external</text>
      <rect x="330" y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="#e4e7e3"/><rect x="331.5" y="2.5" width="3" height="9" rx="1.5" fill="var(--metered-a)"   stroke="var(--metered-a)"/>   <text x="356" y="11" class="legend-lbl">metered</text>
      <rect x="428" y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="#e4e7e3"/><rect x="429.5" y="2.5" width="3" height="9" rx="1.5" fill="var(--scheduled-a)" stroke="var(--scheduled-a)"/> <text x="454" y="11" class="legend-lbl">scheduled</text>
      <g transform="translate(560,0)">
        <rect x="0" y="0" width="20" height="14" rx="3" fill="#ffffff" stroke="var(--muted)" stroke-dasharray="3 2"/>
        <text x="26" y="11" class="legend-lbl">offline (dashed)</text>
      </g>
    </g>
  </g>

  <!-- ============ LANES (neutral = grouping in VALUE) ============ -->
  <rect x="24" y="150" width="1152" height="76" rx="10" fill="var(--lane-a)"/>
  <text x="44" y="188" class="chip-t" transform="rotate(-90 44 188)" text-anchor="middle">ENTRY</text>

  <rect x="24" y="236" width="1152" height="116" rx="10" fill="var(--lane-b)"/>
  <text x="44" y="294" class="chip-t" transform="rotate(-90 44 294)" text-anchor="middle">COMPUTE</text>

  <rect x="24" y="362" width="1152" height="96" rx="10" fill="var(--lane-a)"/>
  <text x="44" y="410" class="chip-t" transform="rotate(-90 44 410)" text-anchor="middle">EXTERNAL</text>

  <rect x="24" y="468" width="1152" height="124" rx="10" fill="var(--lane-b)"/>
  <text x="44" y="530" class="chip-t" transform="rotate(-90 44 530)" text-anchor="middle">DATA</text>

  <!-- ============ CARDS (category = HUE) ============ -->
  <!-- ENTRY: Team web app ① -->
  <g filter="url(#lift)">
    <rect class="card" x="90" y="164" width="330" height="56" rx="9"/>
    <rect class="accent" x="90" y="164" width="5" height="56" rx="2.5" fill="var(--entry-a)"/>
  </g>
  <circle class="badge" cx="112" cy="186" r="9"/><text class="badge-n" x="112" y="190">1</text>
  <text class="ctitle" x="134" y="190" fill="var(--entry-t)">Team web app</text>
  <text class="cbody" x="134" y="210">how the team reaches Atlas, in the browser</text>

  <!-- COMPUTE: API application ② -->
  <g filter="url(#lift)">
    <rect class="card" x="90" y="252" width="330" height="84" rx="9"/>
    <rect class="accent" x="90" y="252" width="5" height="84" rx="2.5" fill="var(--compute-a)"/>
  </g>
  <circle class="badge" cx="112" cy="278" r="9"/><text class="badge-n" x="112" y="282">2</text>
  <text class="ctitle" x="134" y="282" fill="var(--compute-t)">API application</text>
  <text class="cbody" x="134" y="302">auth · routing · business logic</text>
  <text class="cmono" x="134" y="322">one service · the request path</text>

  <!-- COMPUTE: Chat & agent service -->
  <g filter="url(#lift)">
    <rect class="card" x="445" y="252" width="330" height="84" rx="9"/>
    <rect class="accent" x="445" y="252" width="5" height="84" rx="2.5" fill="var(--compute-a)"/>
  </g>
  <text class="ctitle" x="467" y="282" fill="var(--compute-t)">Chat &amp; agent service</text>
  <text class="cbody" x="467" y="302">AI Q&amp;A · propose / confirm writes</text>
  <text class="cmono" x="467" y="322">AI proposes, humans dispose</text>

  <!-- COMPUTE: Ingestion pipeline -->
  <g filter="url(#lift)">
    <rect class="card" x="800" y="252" width="330" height="84" rx="9"/>
    <rect class="accent" x="800" y="252" width="5" height="84" rx="2.5" fill="var(--compute-a)"/>
  </g>
  <text class="ctitle" x="822" y="282" fill="var(--compute-t)">Ingestion pipeline</text>
  <text class="cbody" x="822" y="302">raw documents → structured records</text>
  <text class="cmono" x="822" y="322">triage · classify · promote</text>

  <!-- EXTERNAL: Vendor LLM API (metered cost plane) -->
  <g filter="url(#lift)">
    <rect class="card" x="445" y="376" width="330" height="68" rx="9"/>
    <rect class="accent" x="445" y="376" width="5" height="68" rx="2.5" fill="var(--metered-a)"/>
  </g>
  <text class="ctitle" x="467" y="402" fill="var(--metered-t)">Vendor LLM API</text>
  <text class="cbody" x="467" y="422">Claude · every AI feature</text>
  <text class="cmono" x="467" y="440">metered · cost-tracked</text>

  <!-- EXTERNAL: Microsoft 365 -->
  <g filter="url(#lift)">
    <rect class="card" x="800" y="376" width="330" height="68" rx="9"/>
    <rect class="accent" x="800" y="376" width="5" height="68" rx="2.5" fill="var(--external-a)"/>
  </g>
  <text class="ctitle" x="822" y="402" fill="var(--external-t)">Microsoft 365</text>
  <text class="cbody" x="822" y="422">pipeline &amp; documents upstream</text>
  <text class="cmono" x="822" y="440">sync source · not downstream</text>

  <!-- DATA: Knowledge database ③ -->
  <g filter="url(#lift)">
    <rect class="card" x="90" y="484" width="330" height="90" rx="9"/>
    <rect class="accent" x="90" y="484" width="5" height="90" rx="2.5" fill="var(--data-a)"/>
  </g>
  <circle class="badge" cx="112" cy="510" r="9"/><text class="badge-n" x="112" y="514">3</text>
  <text class="ctitle" x="134" y="514" fill="var(--data-t)">Knowledge database</text>
  <text class="cbody" x="134" y="534">records · estimates · quotes · notes</text>
  <text class="cmono" x="134" y="554">single relational store</text>

  <!-- DATA: Document & prompt store -->
  <g filter="url(#lift)">
    <rect class="card" x="445" y="484" width="330" height="90" rx="9"/>
    <rect class="accent" x="445" y="484" width="5" height="90" rx="2.5" fill="var(--data-a)"/>
  </g>
  <text class="ctitle" x="467" y="514" fill="var(--data-t)">Document &amp; prompt store</text>
  <text class="cbody" x="467" y="534">files &amp; live AI prompts</text>
  <text class="cmono" x="467" y="554">object storage</text>

  <!-- DATA: Background workers (scheduled → dashed, offline) -->
  <g filter="url(#lift)">
    <rect class="card" x="800" y="484" width="330" height="90" rx="9" stroke="var(--scheduled-a)" stroke-width="1.4" stroke-dasharray="5 3"/>
    <rect class="accent" x="800" y="484" width="5" height="90" rx="2.5" fill="var(--scheduled-a)"/>
  </g>
  <text class="ctitle" x="822" y="514" fill="var(--scheduled-t)">Background workers</text>
  <text class="cbody" x="822" y="534">sync + nightly enrichment</text>
  <text class="cmono" x="822" y="554">offline · off the request path</text>

  <!-- ============ EDGES (orthogonal, rounded, in gutters — never over a card) ============ -->
  <!-- ① web app → ② API application -->
  <path class="edge" d="M255 220 L255 252" marker-end="url(#ah)"/>
  <!-- API application → chat -->
  <path class="edge" d="M420 294 L445 294" marker-end="url(#ah)"/>
  <!-- chat → ingestion -->
  <path class="edge" d="M775 294 L800 294" marker-end="url(#ah)"/>
  <!-- chat → vendor LLM -->
  <path class="edge" d="M610 336 L610 376" marker-end="url(#ah)"/>
  <text class="edge-lbl" x="618" y="360">prompts</text>
  <!-- Microsoft 365 → ingestion (upstream pull) -->
  <path class="edge" d="M965 376 L965 336" marker-end="url(#ah)"/>
  <text class="edge-lbl" x="973" y="360">documents</text>
  <!-- ② API application → ③ knowledge database (spine, through empty left gutter) -->
  <path class="edge" d="M255 336 L255 484" marker-end="url(#ah)"/>
  <!-- background workers → document store (offline write) -->
  <path class="edge" d="M800 529 L775 529" marker-end="url(#ah)"/>

  <!-- ============ FOOTER (flow narration · provenance) ============ -->
  <rect x="40" y="690" width="1120" height="64" rx="10" fill="#f6f7f4" stroke="var(--rule)"/>
  <text x="58" y="710" class="footer"><tspan font-weight="700" fill="var(--ink)">Flow:</tspan> ① the team's web app calls ② the API application, which runs chat, agent, and ingestion services over ③ a knowledge database and a document store.</text>
  <text x="58" y="728" class="footer">Ingestion and chat call the metered vendor LLM API; background workers sync Microsoft 365 and run enrichment offline, off the request path.</text>
  <text x="58" y="746" class="prov">public C4 container view · sanitized</text>

  <text x="40" y="772" class="prov">Blueprint Lanes — lanes carry layering in neutral value; cards carry category in hue. Sanitized C4 container view. Standard: _map-spec.md.</text>
</svg>
